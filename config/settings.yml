plugins:
  community_integrations_enabled:
    default: true
    client: false

  # ── Twitch ──────────────────────────────────────────────────────────────────
  community_integrations_twitch_client_id:
    default: ""
    type: string

  community_integrations_twitch_client_secret:
    default: ""
    type: string
    secret: true

  community_integrations_twitch_broadcaster_id:
    default: ""
    type: string

  community_integrations_twitch_subscriber_group:
    default: "Twitch Subscriber"
    type: string

  # ── GitHub Sponsors ─────────────────────────────────────────────────────────
  community_integrations_github_sponsors_target_username:
    default: "ChrisTitusTech"
    type: string

  community_integrations_github_sponsors_group:
    default: "GitHub Sponsors"
    type: string

  # ── YouTube Members ─────────────────────────────────────────────────────────
  community_integrations_youtube_client_id:
    default: ""
    type: string

  community_integrations_youtube_client_secret:
    default: ""
    type: string
    secret: true

  community_integrations_youtube_channel_id:
    default: ""
    type: string

  community_integrations_youtube_creator_refresh_token:
    default: ""
    type: string
    secret: true

  community_integrations_youtube_member_group:
    default: "YouTube Member"
    type: string

  # ── Sync schedule ────────────────────────────────────────────────────────────
  community_integrations_sync_interval_hours:
    default: 6
    type: integer
    min: 1
    max: 24

  # ── Right sidebar ────────────────────────────────────────────────────────────
  community_integrations_gamification_leaderboard_id:
    default: 1
    type: integer
    min: 0
    client: true

  community_integrations_sidebar_category_ids:
    default: ""
    type: string
    client: true
