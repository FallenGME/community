## Discourse Docker configuration for ChrisTitusTech Community Forum
##
## Documentation: https://github.com/discourse/discourse_docker
## Template reference: https://github.com/discourse/discourse_docker/blob/main/samples/standalone.yml
##
## BEFORE BOOTSTRAPPING:
##   1. Replace all REPLACE_WITH_* values below
##   2. Ensure your domain DNS A record points to this VPS
##   3. Ensure ports 80 and 443 are open in UFW
##
## Bootstrap:  ./launcher bootstrap app
## Start:       ./launcher start app
## Rebuild:     ./launcher rebuild app

templates:
  - "templates/postgres.template.yml"
  - "templates/redis.template.yml"
  - "templates/web.template.yml"
  - "templates/web.ratelimited.template.yml"

## Expose HTTP and HTTPS to the host
expose:
  - "80:80"
  - "443:443"

params:
  db_default_text_search_config: "pg_catalog.english"

  ## Increase shared_buffers for 6 GB RAM VPS (recommended: ~25% of RAM)
  db_shared_buffers: "512MB"

  ## Work memory for complex queries (safe up to ~80MB with 6 vCPU)
  db_work_mem: "40MB"

env:
  LC_ALL: en_US.UTF-8
  LANG: en_US.UTF-8
  LANGUAGE: en_US.UTF-8
  DISCOURSE_DEFAULT_LOCALE: en

  ## ── Domain ────────────────────────────────────────────────────────────────
  ## The public hostname for your forum. Must match your DNS A record.
  DISCOURSE_HOSTNAME: 'REPLACE_WITH_YOUR_DOMAIN'   # e.g. community.christitus.com

  ## Email address that receives admin-level notifications (space-separated)
  DISCOURSE_DEVELOPER_EMAILS: 'REPLACE_WITH_ADMIN_EMAIL'

  ## ── Transactional Email (SMTP) ────────────────────────────────────────────
  ## Required for user signups, password resets, and notifications.
  ## Mailgun example — replace with your provider's details.
  DISCOURSE_SMTP_ADDRESS: smtp.mailgun.org
  DISCOURSE_SMTP_PORT: 587
  DISCOURSE_SMTP_USER_NAME: 'REPLACE_WITH_SMTP_USER'      # e.g. postmaster@mg.christitus.com
  DISCOURSE_SMTP_PASSWORD: 'REPLACE_WITH_SMTP_PASSWORD'
  DISCOURSE_SMTP_ENABLE_START_TLS: true
  DISCOURSE_SMTP_DOMAIN: 'REPLACE_WITH_MAIL_DOMAIN'       # e.g. christitus.com
  DISCOURSE_NOTIFICATION_EMAIL: 'REPLACE_WITH_FROM_EMAIL' # e.g. noreply@christitus.com

  ## ── Performance (tuned for 6 vCPU / 6 GB RAM) ────────────────────────────
  ## Unicorn workers handle HTTP requests; keep at (CPU count - 2) to leave
  ## headroom for Sidekiq and Postgres.
  UNICORN_WORKERS: 4

  ## Sidekiq processes — handles email delivery, background jobs, syncs
  UNICORN_SIDEKIQS: 2

  ## ── Optional: CDN ─────────────────────────────────────────────────────────
  ## Uncomment and set if serving static assets through CloudFlare or a CDN.
  # DISCOURSE_CDN_URL: https://cdn.christitus.com

volumes:
  - volume:
      host: /var/discourse/shared/standalone
      guest: /shared
  - volume:
      host: /var/discourse/shared/standalone/log/var-log
      guest: /var/log

hooks:
  after_code:
    - exec:
        cd: $home/plugins
        cmd:
          ## Required: Discourse Docker manager (do not remove)
          - git clone https://github.com/discourse/docker_manager.git

          ## ChrisTitusTech community integrations plugin
          ## (GitHub Sponsors, Twitch Subscribers, YouTube Members)
          ## Publish the contents of plugins/discourse-community-integrations/
          ## to this repo before bootstrapping. See README.md for instructions.
          - git clone https://github.com/ChrisTitusTech/discourse-community-integrations.git

          ## discourse-patreon is bundled with Discourse — it does not need
          ## a separate git clone. Enable it in Admin → Plugins after launch.
